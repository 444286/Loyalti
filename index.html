<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Debug</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: sans-serif; background: #0d1117; color: #fff; padding: 20px; }
    .info { background: #1e2a35; border-radius: 10px; padding: 16px; margin-bottom: 12px; font-size: 14px; word-break: break-all; }
    button { background: #229ED9; color: white; border: none; padding: 14px 24px; border-radius: 10px; font-size: 16px; width: 100%; margin-bottom: 10px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="info" id="info">Loading...</div>
  <button onclick="tryOpenLink()">openTelegramLink</button>
  <button onclick="tryOpenLink2()">openLink</button>
  <button onclick="tryClose()">close()</button>
  <div class="info" id="log"></div>

<script>
  var tg = window.Telegram && window.Telegram.WebApp;
  var info = document.getElementById('info');
  var log = document.getElementById('log');

  info.innerHTML = 
    'tg exists: ' + !!tg + '<br>' +
    'platform: ' + (tg ? tg.platform : 'N/A') + '<br>' +
    'version: ' + (tg ? tg.version : 'N/A') + '<br>' +
    'initData: ' + (tg ? (tg.initData ? 'YES' : 'EMPTY') : 'N/A');

  function tryOpenLink() {
    log.innerHTML = 'trying openTelegramLink...';
    try {
      tg.openTelegramLink('https://t.me/zomato_platform_bot');
      log.innerHTML += ' OK';
    } catch(e) { log.innerHTML += ' ERROR: ' + e.message; }
  }

  function tryOpenLink2() {
    log.innerHTML = 'trying openLink...';
    try {
      tg.openLink('https://t.me/zomato_platform_bot');
      log.innerHTML += ' OK';
    } catch(e) { log.innerHTML += ' ERROR: ' + e.message; }
  }

  function tryClose() {
    log.innerHTML = 'trying close...';
    try { tg.close(); } catch(e) { log.innerHTML += ' ERROR: ' + e.message; }
  }
</script>
</body>
</html>
