<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>নতুন Bot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hind Siliguri', sans-serif;
      background: #0d1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .btn {
      width: 100%;
      max-width: 400px;
      padding: 22px;
      background: linear-gradient(135deg, #229ED9, #1a7aaa);
      color: #fff;
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(34,158,217,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .btn:active {
      transform: scale(0.97);
      box-shadow: 0 4px 16px rgba(34,158,217,0.3);
    }
    .btn svg { width: 28px; height: 28px; fill: white; flex-shrink: 0; }
  </style>
</head>
<body>

<button class="btn" onclick="goToBot()">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
  </svg>
  এখানে ক্লিক করুন
</button>

<script>
  function goToBot() {
    var tg = window.Telegram && window.Telegram.WebApp;
    if (tg) {
      tg.openTelegramLink('https://t.me/zomato_platform_bot');
      setTimeout(function () { tg.close(); }, 500);
    } else {
      window.location.replace('https://t.me/zomato_platform_bot');
    }
  }
</script>
</body>
</html>
